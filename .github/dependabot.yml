version: 2
updates:
  # Check for updates to nuget packages
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: 'cron'
      cronjob: '0 8 * * MON#1'
      timezone: 'Europe/Oslo'
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "fix:"
    # Dependabot cannot distinguish between TFM-conditional PackageReferences,
    # so it bumps all instances to the same version. Block major updates for
    # packages that are pinned per-TFM to prevent cross-major version bumps.
    ignore:
      - dependency-name: "Microsoft.AspNetCore.Authorization"
        update-types:
          - "version-update:semver-major"
    groups:
      # Group all non-major updates together
      minor-patch-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Check for updates to GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: 'cron'
      cronjob: '0 8 * * MON#1'
      timezone: 'Europe/Oslo'
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci:"
